<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application MAXCUT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Bienvenue dans l'application MAXCUT</h1>
    </header>
    <main>
        <section id="parametres">
            <h2>Paramètres</h2>
            <form>
                <label for="format">Formats de feuilles:</label>
                <input type="text" id="format" name="format"><br>
                <label for="kerf">Kerf:</label>
                <input type="text" id="kerf" name="kerf"><br>
                <label for="toleranec">Tolérance:</label>
                <input type="text" id="toleria" name="toleria"><br>
            </form>
        </section>
        <section id="saisie-pieces">
            <h2>Saisie des Pièces</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nom de pièce</th>
                        <th>Quantité</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Lignes de tableau pour les pièces devra être ajoutées dynamiquement -->
                </tbody>
            </table>
            <button id="ajouter-piece">Ajouter Pièce</button>
            <button id="importer-csv">Importer CSV</button>
        </section>
        <section id="optimisation">
            <h2>Optimisation</h2>
            <p>Algorithme bin packing 2D: <span id="resultat-optimisation"></span></p>
            <button id="regrouper-matiere">Regrouper par Matière</button>
        </section>
        <section id="resultats">
            <h2>Résultats</h2>
            <div id="sommaire">
                <h3>Sommaire avec Statistiques</h3>
                <p id="statistiques"></p>
            </div>
            <div id="detail">
                <h3>Détails par Format</h3>
                <p id="details-format"></p>
            </div>
            <div id="plans-coupe">
                <h3>Plans de Coupe avec Visualisation 2D</h3>
                <div id="visualisation-2d"></div>
            </div>
        </section>
        <section id="export">
            <h2>Export</h2>
            <button id="export-pdf">Exporter en PDF</button>
            <button id="export-csv">Exporter en CSV</button>
        </section>
        <section id="informations-client">
            <h2>Informations Client</h2>
            <form>
                <label for="client-nom">Nom:</label>
                <input type="text" id="client-nom" name="client-nom"><br>
                <label for="client-email">Email:</label>
                <input type="email" id="client-email" name="client-email"><br>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
